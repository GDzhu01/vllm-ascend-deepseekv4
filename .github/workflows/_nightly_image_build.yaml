name: 'Nightly image build'

on:
  workflow_call:
    inputs:
      target:
        required: true
        type: string
        description: "Build target: 'a2' or 'a3'"
      quay_username:
        required: false
        type: string
        description: "Quay username for pushing images"
    secrets:
      HW_USERNAME:
        required: false
      HW_TOKEN:
        required: false
      GITEE_TOKEN:
        required: false
      QUAY_PASSWORD:
        required: false

jobs:
  build:
    name: Build nightly-${{ inputs.target }} image
    runs-on: [ARM64, self-hosted]
    steps:
      - uses: actions/checkout@v6

      - name: Login to Huawei Cloud SWR
        id: login-swr
        if: ${{ env.HW_USERNAME != '' && env.HW_TOKEN != '' }}
        env:
          HW_USERNAME: ${{ secrets.HW_USERNAME }}
          HW_TOKEN: ${{ secrets.HW_TOKEN }}
        run: |
          echo "$HW_TOKEN" | docker login -u "$HW_USERNAME" --password-stdin swr.cn-southwest-2.myhuaweicloud.com

      - name: Login to Quay
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ inputs.quay_username }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build nightly-${{ inputs.target }} image
        env:
          GITEE_USERNAME: ${{ vars.GITEE_USERNAME }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          IMAGE="swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/vllm-ascend:nightly-${{ inputs.target }}-pre"
          docker build \
            --network host \
            --platform linux/arm64 \
            -f .github/workflows/dockerfiles/Dockerfile.nightly.${{ inputs.target }} \
            --build-arg CANN_VERSION="8.5.1" \
            --build-arg UBUNTU_VERSION="22.04" \
            --build-arg PYTHON_VERSION="3.11" \
            --build-arg GITEE_USERNAME="${GITEE_USERNAME}" \
            --build-arg GITEE_TOKEN="${GITEE_TOKEN}" \
            -t "$IMAGE" .

      - name: Push image to SWR
        if: ${{ steps.login-swr.conclusion == 'success' }}
        run: |
          docker push swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/vllm-ascend:nightly-${{ inputs.target }}-pre

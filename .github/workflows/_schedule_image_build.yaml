name: Image_oncall
on:
  workflow_call:
    inputs:
      suffix:
        description: 'The tag subfix to use'
        required: true
        type: string
      should_push:
        description: 'Whether to push the image'
        required: false
        type: boolean
        default: False
      dockerfile:
        description: 'The Dockerfile to use'
        required: false
        type: string
      quay_username:
        description: 'Quay username for pushing images'
        required: false
        type: string
    secrets:
        QUAY_PASSWORD:
            description: 'Quay password for pushing images'
            required: false

jobs:
  build-push-digest:
    name: build
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: linux/amd64
            runner: [X64, self-hosted]
            tag: amd64
          - arch: linux/arm64
            runner: [ARM64, self-hosted]
            tag: arm64
    steps:

    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        persist-credentials: false
        ref: releases/v0.18.0


    - name: Publish - Login to Quay Container Registry
      if: ${{ inputs.should_push }}
      uses: docker/login-action@v4
      with:
        registry: quay.io
        username: ${{ inputs.quay_username }}
        password: ${{ secrets.QUAY_PASSWORD }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
      with:
        install: true
        driver: docker-container
        use: true

    - name: Build and push
      uses: docker/build-push-action@v7
      id: build
      with:
        platforms: ${{ matrix.arch }}
        # use the current repo path as the build context, ensure .git is contained
        context: .
        file: ${{ inputs.dockerfile || 'Dockerfile' }}
        # only trigger when tag, branch/main push
        push: ${{ inputs.should_push }}
        # Push each arch under a temporary tag so the merge job can reference
        # them without needing to pass digests via artifacts.
        tags: quay.io/wjunlu/vllm-ascend-daily:stage-${{ github.run_id }}-${{ inputs.suffix }}-${{ matrix.tag }}
        build-args: |
          PIP_INDEX_URL=https://pypi.org/simple
        provenance: false


  merge-image:
    runs-on: [ARM64, self-hosted]
    needs: build-push-digest
    if: ${{ inputs.should_push }}
    steps:
      - name: Prepare suffix
        id: suffix
        run: |
          if [ -n "${{ inputs.suffix }}" ]; then
            echo "SUFFIX=-${{ inputs.suffix }}" >> $GITHUB_ENV
          else
            echo "SUFFIX=" >> $GITHUB_ENV
          fi

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          # TODO(yikun): add more hub image and a note on release policy for container image
          images: |
            quay.io/wjunlu/vllm-ascend-daily
          # Note for test case
          # https://github.com/marketplace/actions/docker-metadata-action#typeref
          # 1. branch job publish per main/*-dev branch commits
          # 2. main and dev pull_request is build only, so the tag pr-N-openeuler is fine
          # 3. only pep440 matched tag will be published:
          #    - v0.7.1 --> v0.7.1-openeuler
          #    - pre/post/dev: v0.7.1rc1-openeuler/v0.7.1rc1-openeuler/v0.7.1rc1.dev1-openeuler/v0.7.1.post1-openeuler, no latest
          #      which follow the rule from vLLM with prefix v
          # TODO(yikun): the post release might be considered as latest release
          tags: |
            type=ref,event=branch,prefix=nightly-,suffix=${{ env.SUFFIX }}
            type=ref,event=pr,prefix=nightly-,suffix=${{ env.SUFFIX }}
            type=pep440,pattern={{raw}},suffix=${{ env.SUFFIX }}
          flavor:
            latest=false

      - name: Login to Quay
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ inputs.quay_username }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Merge and push multi-arch image
        env:
          IMAGE: quay.io/wjunlu/vllm-ascend-daily
          TAGS: ${{ steps.meta.outputs.tags }}
          STAGE_AMD64: quay.io/wjunlu/vllm-ascend-daily:stage-${{ github.run_id }}-${{ inputs.suffix }}-amd64
          STAGE_ARM64: quay.io/wjunlu/vllm-ascend-daily:stage-${{ github.run_id }}-${{ inputs.suffix }}-arm64
        run: |
          echo "Source stage tags:"
          echo "  $STAGE_AMD64"
          echo "  $STAGE_ARM64"
          echo "Current tags:"
          echo "$TAGS"

          for tag in $TAGS; do
            echo "Creating tag $tag"
            docker buildx imagetools create \
              -t "$tag" \
              "$STAGE_AMD64" \
              "$STAGE_ARM64"
          done

  cleanup-stage-tags:
    runs-on: [ARM64, self-hosted]
    needs: [build-push-digest, merge-image]
    if: ${{ always() && inputs.should_push }}
    steps:
      - name: Delete temporary stage tags from Quay
        env:
          QUAY_USER: ${{ inputs.quay_username }}
          QUAY_PASS: ${{ secrets.QUAY_PASSWORD }}
          STAGE_TAGS: |
            stage-${{ github.run_id }}-${{ inputs.suffix }}-amd64
            stage-${{ github.run_id }}-${{ inputs.suffix }}-arm64
        run: |
          set +e
          for tag in $STAGE_TAGS; do
            echo "Deleting quay.io/wjunlu/vllm-ascend-daily:$tag"
            docker run --rm quay.io/skopeo/stable:latest \
              delete --creds "$QUAY_USER:$QUAY_PASS" \
              "docker://quay.io/wjunlu/vllm-ascend-daily:$tag" \
              || echo "Failed to delete $tag (may not exist), continuing"
          done
          exit 0
